name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install PureScript toolchain
        run: npm install -g purescript spago

      - name: Install dependencies
        run: spago install

      - name: Run tests
        run: spago test
